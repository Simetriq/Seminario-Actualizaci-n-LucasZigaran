<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detector de Toxicidad - TensorFlow.js</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .resultado { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .categoria { margin: 8px 0; }
        .alto { color: red; font-weight: bold; }
        .bajo { color: green; }
    </style>
    <!-- Cargar TensorFlow.js y el modelo de toxicidad -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
</head>
<body>
    <h1>🧪 Clasificador de Toxicidad</h1>
    <p>Ingresa un texto y el modelo determinará si contiene lenguaje ofensivo.</p>
    <textarea id="texto" placeholder="Escribe algo aquí...">Eres un inútil y deberías desaparecer</textarea>
    <br>
    <button id="analizar">Analizar toxicidad</button>
    <div class="resultado" id="resultado"></div>

    <script>
        // Umbral de confianza (0.0 a 1.0). Por defecto 0.85
        const umbral = 0.85;
        let modelo = null;

        // Cargar el modelo al iniciar
        toxicity.load(umbral).then(model => {
            modelo = model;
            document.getElementById('resultado').innerHTML = '<p>✅ Modelo cargado. Listo para analizar.</p>';
        }).catch(err => {
            console.error(err);
            document.getElementById('resultado').innerHTML = '<p>❌ Error al cargar el modelo.</p>';
        });

        document.getElementById('analizar').addEventListener('click', async () => {
            if (!modelo) {
                alert("El modelo aún no se ha cargado. Espera un momento.");
                return;
            }

            const texto = document.getElementById('texto').value;
            if (texto.trim() === "") {
                alert("Por favor escribe algo.");
                return;
            }

            // Realizar la clasificación
            const predicciones = await modelo.classify([texto]);
            
            // Mostrar resultados
            let html = `<h3>Resultados para: "${texto}"</h3>`;
            predicciones.forEach(pred => {
                const esToxico = pred.results[0].match;
                const confianza = (pred.results[0].probabilities[1] * 100).toFixed(2);
                const clase = esToxico ? 'alto' : 'bajo';
                html += `<div class="categoria">
                            <strong>${pred.label}</strong>: 
                            <span class="${clase}">${esToxico ? 'TÓXICO' : 'No tóxico'} (${confianza}%)</span>
                         </div>`;
            });
            document.getElementById('resultado').innerHTML = html;
        });
    </script>
</body>
</html>
