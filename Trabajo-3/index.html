<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Alumnos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f13;
      --surface:   #16181f;
      --border:    #2a2d38;
      --accent:    #e8ff47;
      --accent2:   #47d4ff;
      --text:      #f0f0f0;
      --muted:     #6b7080;
      --danger:    #ff4747;
      --radius:    10px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Noise overlay ─────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ────────────────────────────────── */
    header {
      margin-bottom: 48px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 80px);
      line-height: 1;
      color: var(--text);
      letter-spacing: 1px;
    }
    h1 span { color: var(--accent); }

    /* ── Form card ─────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 48px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,.12);
    }
    .field input::placeholder { color: var(--muted); }

    /* ── Error msg ─────────────────────────────── */
    #error-msg {
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
      margin-bottom: 16px;
    }

    /* ── Button ────────────────────────────────── */
    .btn-row { display: flex; gap: 12px; align-items: center; }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: .5px;
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    button:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: #0e0f13;
      padding: 13px 28px;
      font-size: 14px;
    }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(232,255,71,.4); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 13px 20px;
      font-size: 13px;
    }
    .btn-danger:hover { background: rgba(255,71,71,.08); }

    /* ── Counter badge ─────────────────────────── */
    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }
    .count { color: var(--accent2); font-weight: 600; }

    /* ── Table section ─────────────────────────── */
    .table-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(232,255,71,.06);
    }
    thead th {
      padding: 14px 20px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      text-align: left;
      font-weight: 500;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    tbody td {
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
    }

    /* rank column */
    td.rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
      width: 50px;
    }

    /* nota badge */
    .nota-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
    }
    .nota-high  { background: rgba(232,255,71,.12); color: var(--accent);  }
    .nota-mid   { background: rgba(71,212,255,.12); color: var(--accent2); }
    .nota-low   { background: rgba(255,71,71,.12);  color: var(--danger);  }

    /* delete btn inline */
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .del-btn:hover { color: var(--danger); background: rgba(255,71,71,.1); }

    /* ── Empty state ───────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Fade-in animation ─────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    tbody tr { animation: fadeUp .3s ease both; }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 560px) {
      .fields { grid-template-columns: 1fr; }
      .btn-row { flex-wrap: wrap; }
      .meta { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="eyebrow">Sistema escolar</p>
    <h1>Registro de<br/><span>Alumnos</span></h1>
  </header>

  <!-- FORM -->
  <div class="card">
    <div class="fields">
      <div class="field">
        <label for="inp-nombre">Nombre</label>
        <input id="inp-nombre" type="text" placeholder="Ej: María García" maxlength="60"/>
      </div>
      <div class="field">
        <label for="inp-edad">Edad</label>
        <input id="inp-edad" type="number" placeholder="Ej: 17" min="1" max="120"/>
      </div>
      <div class="field">
        <label for="inp-nota">Nota</label>
        <input id="inp-nota" type="number" placeholder="0 – 10" min="0" max="10" step="0.01"/>
      </div>
    </div>
    <div id="error-msg"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="agregarAlumno()">＋ Agregar alumno</button>
      <button class="btn-danger"  onclick="borrarTodo()">Borrar todo</button>
      <span class="meta">Total: <span class="count" id="total">0</span> alumnos</span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <h2>Datos de Alumnos</h2>
    <div class="table-wrap" id="tabla-wrap">
      <!-- renderizado por JS -->
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'alumnos_v1';

  /* ── Cargar desde localStorage ─────────────── */
  function cargarDatos() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function guardarDatos(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  /* ── Ordenar: primero por nota DESC, luego nombre ASC ── */
  function ordenar(arr) {
    return [...arr].sort((a, b) => {
      if (b.nota !== a.nota) return b.nota - a.nota;
      return a.nombre.localeCompare(b.nombre, 'es');
    });
  }

  /* ── Badge de nota ─────────────────────────── */
  function classBadge(nota) {
    if (nota >= 7) return 'nota-high';
    if (nota >= 5) return 'nota-mid';
    return 'nota-low';
  }

  /* ── Renderizar tabla ──────────────────────── */
  function renderizar() {
    const alumnos = ordenar(cargarDatos());
    const wrap = document.getElementById('tabla-wrap');
    document.getElementById('total').textContent = alumnos.length;

    if (alumnos.length === 0) {
      wrap.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>Aún no hay alumnos cargados.<br/>Completá el formulario y presioná <strong>Agregar alumno</strong>.</p>
        </div>`;
      return;
    }

    let rows = alumnos.map((a, i) => `
      <tr>
        <td class="rank">${String(i + 1).padStart(2, '0')}</td>
        <td>${escHtml(a.nombre)}</td>
        <td>${a.edad}</td>
        <td><span class="nota-badge ${classBadge(a.nota)}">${a.nota.toFixed(2)}</span></td>
        <td><button class="del-btn" title="Eliminar" onclick="eliminar(${a.id})">✕</button></td>
      </tr>`).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* ── Agregar alumno ────────────────────────── */
  function agregarAlumno() {
    const nombre = document.getElementById('inp-nombre').value.trim();
    const edadRaw = document.getElementById('inp-edad').value.trim();
    const notaRaw = document.getElementById('inp-nota').value.trim();
    const errEl = document.getElementById('error-msg');

    // Validaciones
    if (!nombre) { errEl.textContent = '⚠ Ingresá el nombre del alumno.'; return; }
    const edad = Number(edadRaw);
    if (!edadRaw || isNaN(edad) || edad < 1 || edad > 120) {
      errEl.textContent = '⚠ Ingresá una edad válida (1–120).'; return;
    }
    const nota = Number(notaRaw);
    if (notaRaw === '' || isNaN(nota) || nota < 0 || nota > 10) {
      errEl.textContent = '⚠ La nota debe ser un número entre 0 y 10.'; return;
    }
    errEl.textContent = '';

    const alumnos = cargarDatos();
    const id = Date.now();
    alumnos.push({ id, nombre, edad, nota });
    guardarDatos(alumnos);

    // Limpiar inputs
    document.getElementById('inp-nombre').value = '';
    document.getElementById('inp-edad').value   = '';
    document.getElementById('inp-nota').value   = '';
    document.getElementById('inp-nombre').focus();

    renderizar();
  }

  /* ── Eliminar un alumno ────────────────────── */
  function eliminar(id) {
    const alumnos = cargarDatos().filter(a => a.id !== id);
    guardarDatos(alumnos);
    renderizar();
  }

  /* ── Borrar todo ───────────────────────────── */
  function borrarTodo() {
    if (!confirm('¿Seguro que querés borrar todos los alumnos?')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderizar();
  }

  /* ── Enter en inputs ───────────────────────── */
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') agregarAlumno(); });
  });

  /* ── Escape XSS básico ─────────────────────── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Init ──────────────────────────────────── */
  renderizar();
</script>
</body>
</html>
