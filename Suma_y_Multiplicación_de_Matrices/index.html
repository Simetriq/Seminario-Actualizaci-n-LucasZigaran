<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suma y Multiplicación de Matrices</title>
</head>
<body>
    <h1>Suma y Multiplicación de Matrices</h1>
    <label>Filas:</label>
    <input type="number" id="filas" min="1" value="2"><br><br>
    <label>Columnas:</label>
    <input type="number" id="columnas" min="1" value="2"><br><br>
    <button onclick="generarMatrices()">Generar Matrices</button><br><br>

    <div id="matrices"></div>

    <label>Operación:</label>
    <select id="tipo">
        <option value="suma">Suma</option>
        <option value="multiplicacion">Multiplicación</option>
    </select><br><br>
    <button onclick="operar()">Calcular</button>
    <div id="resultado"></div>

    <script>
        function generarMatrices() {
            const filas = parseInt(document.getElementById('filas').value);
            const columnas = parseInt(document.getElementById('columnas').value);
            const contenedor = document.getElementById('matrices');
            contenedor.innerHTML = '';

            for (let m = 1; m <= 2; m++) {
                contenedor.innerHTML += `<h3>Matriz ${m}</h3>`;
                const tabla = document.createElement('table');
                for (let i = 0; i < filas; i++) {
                    const fila = document.createElement('tr');
                    for (let j = 0; j < columnas; j++) {
                        const celda = document.createElement('td');
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.id = `m${m}_${i}_${j}`;
                        input.value = '0';
                        celda.appendChild(input);
                        fila.appendChild(celda);
                    }
                    tabla.appendChild(fila);
                }
                contenedor.appendChild(tabla);
                contenedor.innerHTML += '<br>';
            }
        }

        function operar() {
            const filas = parseInt(document.getElementById('filas').value);
            const columnas = parseInt(document.getElementById('columnas').value);
            const tipo = document.getElementById('tipo').value;

            const m1 = [];
            const m2 = [];
            for (let i = 0; i < filas; i++) {
                const fila1 = [];
                const fila2 = [];
                for (let j = 0; j < columnas; j++) {
                    fila1.push(parseFloat(document.getElementById(`m1_${i}_${j}`).value));
                    fila2.push(parseFloat(document.getElementById(`m2_${i}_${j}`).value));
                }
                m1.push(fila1);
                m2.push(fila2);
            }

            fetch('/operar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ m1, m2, tipo })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(data.resultado, null, 2) + '</pre>';
            });
        }
    </script>
</body>
</html>
