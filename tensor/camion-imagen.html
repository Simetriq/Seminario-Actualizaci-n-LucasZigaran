<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detector de Camiones en Imagen</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; text-align: center; }
        canvas { border: 1px solid #ccc; margin-top: 20px; max-width: 100%; }
        #alerta { background: red; color: white; padding: 10px; display: none; margin-top: 20px; border-radius: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
    <h1>🚛 Alerta de Camión (imagen estática)</h1>
    <input type="file" id="inputImagen" accept="image/*">
    <br>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="alerta">🚨 ¡ALERTA! Se detectó un camión 🚨</div>

    <script>
        let modelo = null;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const alertaDiv = document.getElementById('alerta');

        // Cargar modelo COCO-SSD
        cocoSsd.load().then(model => {
            modelo = model;
            console.log("Modelo listo");
        }).catch(err => console.error(err));

        document.getElementById('inputImagen').addEventListener('change', async (e) => {
            if (!modelo) {
                alert("Espera a que cargue el modelo.");
                return;
            }

            const archivo = e.target.files[0];
            if (!archivo) return;

            const img = new Image();
            img.onload = async () => {
                // Dibujar imagen en el canvas
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // Detectar objetos
                const predicciones = await modelo.detect(canvas);
                
                // Filtrar solo camiones
                const camiones = predicciones.filter(pred => pred.class === 'truck');
                
                // Dibujar recuadros para todos los objetos (opcional) pero resaltar camiones
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                let hayCamion = false;
                for (let pred of predicciones) {
                    const [x, y, w, h] = pred.bbox;
                    if (pred.class === 'truck') {
                        hayCamion = true;
                        ctx.strokeStyle = 'red';
                        ctx.lineWidth = 4;
                        ctx.fillStyle = 'red';
                        ctx.fillText(`🚛 CAMIÓN (${Math.round(pred.score*100)}%)`, x, y-5);
                    } else {
                        ctx.strokeStyle = 'blue';
                        ctx.lineWidth = 2;
                        ctx.fillStyle = 'blue';
                        ctx.fillText(pred.class, x, y-5);
                    }
                    ctx.strokeRect(x, y, w, h);
                }
                
                // Mostrar u ocultar alerta
                alertaDiv.style.display = hayCamion ? 'block' : 'none';
            };
            img.src = URL.createObjectURL(archivo);
        });
    </script>
</body>
</html>
